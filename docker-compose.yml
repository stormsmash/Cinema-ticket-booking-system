name: cinema-ticket-booking

services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      GIN_MODE: ${GIN_MODE:-release}
      MONGO_URI: mongodb://mongo:27017/cinema?replicaSet=rs0&directConnection=true
      MONGO_DATABASE: ${MONGO_DATABASE:-cinema}
      REDIS_ADDRESS: redis:6379
      REDIS_DB: "0"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:3000/api/v1/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SESSION_TTL: ${SESSION_TTL:-24h}
      SEAT_LOCK_TTL: ${SEAT_LOCK_TTL:-5m}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:8080/api/v1/health/ready | grep -q '"status":"ready"'
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mongo:
    image: mongo:8.0.26
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - 'mongosh --quiet --host localhost:27017 --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)"'
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mongo-init:
    image: mongo:8.0.26
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        mongosh --host mongo:27017 --quiet --eval '
          try {
            rs.status();
          } catch (error) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongo:27017" }]
            });
          }
        '
        until mongosh --host mongo:27017 --quiet --eval 'quit(db.hello().isWritablePrimary ? 0 : 1)'; do
          sleep 1
        done

  redis:
    image: redis:8.8.0-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --notify-keyspace-events
      - "E$$gx"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
