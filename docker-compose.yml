name: cinema-ticket-booking

services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      GIN_MODE: ${GIN_MODE:-release}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:8080/api/v1/health | grep -q '"status":"ok"'
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
